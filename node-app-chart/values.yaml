replicaCount: 2

image:
  repository: 12amit1234/node-k8s-app
  pullPolicy: Always
  tag: "latest"

# -------------------------
# SERVICE ACCOUNT (fixes error)
# -------------------------
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# -------------------------
# SERVICE CONFIG
# -------------------------
service:
  type: ClusterIP
  port: 80

containerPort: 3000

# -------------------------
# INGRESS CONFIG
# -------------------------
ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: node.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# -------------------------
# AUTOSCALING (HPA FIX)
# IMPORTANT: keep false unless metrics-server installed
# -------------------------
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# -------------------------
# RESOURCES (optional)
# -------------------------
resources: {}

# -------------------------
# HEALTH PROBES (if used in templates)
# -------------------------
livenessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 10